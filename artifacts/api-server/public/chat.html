<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Chat — Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="avatar">👗</div>
      <div class="info">
        <h2>Fashion Store</h2>
        <span>Savdo yordamchisi</span>
      </div>
    </div>

    <div class="hint-bar">
      <strong>Mijoz sifatida sinab ko'ring:</strong>
      <span>· Ko'ylak bormi?</span> &nbsp;
      <span>· M o'lcham bormi?</span> &nbsp;
      <span>· Buyurtma bermoqchiman</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chat-input-area">
      <input
        id="messageInput"
        type="text"
        placeholder="Xabar yozing..."
        autocomplete="off"
      />
      <button id="sendBtn" title="Yuborish">
        &#9658;
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
